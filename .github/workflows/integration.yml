name: Backend integration

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: read

jobs:
  broker-integration:
    name: ${{ matrix.name }} integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: NATS
            package: ./nats
          - name: NSQ
            package: ./nsq
          - name: RabbitMQ
            package: ./rabbitmq
          - name: Redis commands
            package: ./redisdb
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up minimum Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.25.x
          cache: false
      - name: Run live backend tests
        run: go test -tags=integration -timeout=15m ${{ matrix.package }}

  redis-streams:
    name: Redis Streams native integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up minimum Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.25.x
          cache: false
      - name: Run Redis Streams integration
        run: go test -tags=integration -timeout=15m ./redisstream

  valkey-streams:
    name: Valkey 9 native integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up minimum Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.25.x
          cache: false
      - name: Run Valkey 9 integration
        run: go test -tags=integration -timeout=15m ./valkeystream
