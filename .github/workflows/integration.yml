name: Backend integration

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: read

jobs:
  broker-integration:
    name: ${{ matrix.name }} integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: NATS
            package: ./nats
          - name: NSQ
            package: ./nsq
          - name: RabbitMQ
            package: ./rabbitmq
          - name: Redis commands
            package: ./redisdb
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up minimum Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25.x
          cache: false
      - name: Run live backend tests
        run: go test -tags=integration -timeout=15m ${{ matrix.package }}

  redis-streams:
    name: Redis Streams native integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up minimum Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25.x
          cache: false
      - name: Run Redis Streams integration
        run: go test -tags=integration -timeout=15m ./redisstream

  valkey-streams:
    name: Valkey 9 native integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up minimum Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.25.x
          cache: false
      - name: Run Valkey 9 integration
        run: go test -tags=integration -timeout=15m ./valkeystream
