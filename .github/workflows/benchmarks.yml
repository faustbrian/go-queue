name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: "43 3 * * 1"

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: go test -run='^$' -bench=. -benchmem ./...
